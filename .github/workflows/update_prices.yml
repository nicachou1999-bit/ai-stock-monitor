name: Update Stock Prices

on:
  schedule:
    # 平日台北 09:00（UTC 01:00）觸發一次，之後由 job 內部迴圈每 5 分鐘更新到收盤
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: price-loop
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Intraday loop (every 5 min until 13:35 Taipei)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          export TZ=Asia/Taipei
          END_EPOCH=$(date -d "13:35" +%s)
          echo "Loop will end at: $(date -d @$END_EPOCH)"
          while true; do
            echo "----- cycle $(date +'%H:%M:%S') -----"
            git pull --rebase --autostash origin main || true
            python fetch_prices.py || echo "fetch failed, continue"
            git add data.json
            if git diff --staged --quiet; then
              echo "no change"
            else
              git commit -m "prices: $(date +'%Y-%m-%d %H:%M')"
              git push || echo "push failed, retry next cycle"
            fi
            if [ "$(date +%s)" -ge "$END_EPOCH" ]; then
              echo "Market closed, loop ended."
              break
            fi
            sleep 300
          done
