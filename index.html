<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 選股監控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0f0f13; color: #e8e8e8; min-height: 100vh; }

  header { background: #1a1a24; padding: 14px 16px 10px;
           position: sticky; top: 0; z-index: 10;
           border-bottom: 1px solid #2a2a3a; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; color: #fff; }
  #refresh-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px;
                 padding: 6px 14px; font-size: 13px; cursor: pointer; }
  #refresh-btn:active { background: #1d4ed8; }
  #updated { font-size: 11px; color: #6b7280; margin-top: 5px; }

  .index-bar { background: #1e1e2e; padding: 10px 16px;
               display: flex; gap: 18px; flex-wrap: wrap;
               border-bottom: 1px solid #2a2a3a; }
  .idx-item { display: flex; flex-direction: column; }
  .idx-label { font-size: 10px; color: #6b7280; }
  .idx-val   { font-size: 15px; font-weight: 700; }

  section { padding: 12px 12px 4px; }
  .section-title { font-size: 11px; font-weight: 600; color: #6b7280;
                   letter-spacing: 1px; text-transform: uppercase;
                   margin-bottom: 8px; padding-left: 2px; }

  .card { background: #1a1a24; border-radius: 12px; padding: 13px 14px;
          margin-bottom: 8px; border-left: 4px solid transparent;
          display: flex; align-items: center; gap: 10px; }

  .card.buy       { border-left-color: #22c55e; }
  .card.fair      { border-left-color: #3b82f6; }
  .card.watch     { border-left-color: #f59e0b; }
  .card.expensive { border-left-color: #ef4444; }
  .card.etf       { border-left-color: #8b5cf6; }
  .card.index     { border-left-color: #6b7280; }
  .card.na        { border-left-color: #374151; }

  .card-main { flex: 1; }
  .card-name { font-size: 15px; font-weight: 700; color: #f0f0f0; }
  .card-price { font-size: 22px; font-weight: 800; margin-top: 1px; }
  .card-price.up   { color: #f87171; }
  .card-price.down { color: #4ade80; }
  .card-price.flat { color: #e8e8e8; }

  .card-right { text-align: right; }
  .pct { font-size: 14px; font-weight: 600; border-radius: 6px;
         padding: 2px 8px; margin-bottom: 4px; display: inline-block; }
  .pct.up   { background: #7f1d1d33; color: #f87171; }
  .pct.down { background: #14532d33; color: #4ade80; }
  .pct.flat { background: #1f293733; color: #9ca3af; }

  .zone-badge { font-size: 11px; font-weight: 600; border-radius: 5px;
                padding: 2px 7px; margin-top: 3px; display: inline-block; }
  .zone-buy       { background: #14532d55; color: #22c55e; }
  .zone-fair      { background: #1e3a8a55; color: #60a5fa; }
  .zone-watch     { background: #78350f55; color: #fbbf24; }
  .zone-expensive { background: #7f1d1d55; color: #f87171; }
  .zone-etf       { background: #4c1d9555; color: #a78bfa; }
  .zone-index     { background: #1f293755; color: #9ca3af; }

  .valuation-row { font-size: 10px; color: #4b5563; margin-top: 4px; }

  .alert-banner { background: #22c55e22; border: 1px solid #22c55e55;
                  border-radius: 10px; padding: 10px 14px; margin: 8px 12px;
                  font-size: 13px; color: #4ade80; display: none; }
  .alert-banner.show { display: block; }

  footer { text-align: center; padding: 20px; font-size: 11px; color: #374151; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📊 AI 選股監控</h1>
    <button id="refresh-btn" onclick="loadData()">↻ 更新</button>
  </div>
  <div id="updated">載入中…</div>
</header>

<div class="index-bar" id="index-bar">
  <div class="idx-item"><span class="idx-label">加權指數</span><span class="idx-val" id="twii">—</span></div>
  <div class="idx-item"><span class="idx-label">VIX</span><span class="idx-val" id="vix">—</span></div>
</div>

<div id="alert-banner" class="alert-banner"></div>

<section>
  <div class="section-title">核心持股</div>
  <div id="core-list"></div>
</section>

<section>
  <div class="section-title">觀察名單</div>
  <div id="observe-list"></div>
</section>

<section>
  <div class="section-title">ETF 定期定額</div>
  <div id="etf-list"></div>
</section>

<footer>資料來源：Yahoo Finance｜僅供參考，非投資建議</footer>

<script>
const ZONE_LABEL = {
  buy: "★ 積極買進", fair: "◎ 合理布局",
  watch: "△ 謹慎觀察", expensive: "✗ 偏貴等待",
  etf: "定期定額", index: "", na: "—"
};

function pctClass(pct) {
  if (pct > 0) return "up";
  if (pct < 0) return "down";
  return "flat";
}

function fmt(n, dec=0) {
  if (n == null) return "—";
  return n.toLocaleString("zh-TW", {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function makeCard(symbol, d) {
  const zone = d.zone || "na";
  const cls  = pctClass(d.pct);
  const sign = d.pct > 0 ? "+" : "";
  const pctStr = d.price ? `${sign}${d.pct?.toFixed(2)}%` : "—";

  let valRow = "";
  if (d.cheap) {
    valRow = `<div class="valuation-row">買≤${fmt(d.cheap)} ／ 合理≤${fmt(d.fair)} ／ 貴>${fmt(d.rich)}</div>`;
  }

  return `
  <div class="card ${zone}">
    <div class="card-main">
      <div class="card-name">${d.name}</div>
      <div class="card-price ${cls}">${fmt(d.price)}</div>
      ${valRow}
    </div>
    <div class="card-right">
      <div class="pct ${cls}">${pctStr}</div>
      <div class="zone-badge zone-${zone}">${ZONE_LABEL[zone] || zone}</div>
    </div>
  </div>`;
}

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.textContent = "載入中…";
  try {
    const r = await fetch(`./data.json?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status);
    const json = await r.json();

    document.getElementById("updated").textContent = `最後更新：${json.updated}（台北時間）`;

    let core = "", observe = "", etf = "";
    let alerts = [];

    for (const [sym, d] of Object.entries(json.data || {})) {
      if (d.type === "index") {
        const cls = pctClass(d.pct);
        const sign = d.pct > 0 ? "+" : "";
        document.getElementById("twii").innerHTML =
          `<span class="${cls === 'up' ? 'pct up' : cls === 'down' ? 'pct down' : ''}" style="padding:0;background:none;font-size:15px">${fmt(d.price)} <small>${sign}${d.pct?.toFixed(2)}%</small></span>`;
        continue;
      }
      const card = makeCard(sym, d);
      if (d.type === "core")    core    += card;
      else if (d.type === "observe") observe += card;
      else if (d.type === "etf")     etf     += card;

      if (d.zone === "buy")  alerts.push(`${d.name} 進入★積極買進區（${fmt(d.price)}）`);
      if (d.zone === "fair") alerts.push(`${d.name} 進入◎合理布局區（${fmt(d.price)}）`);
    }

    document.getElementById("core-list").innerHTML    = core    || "<p style='color:#4b5563;font-size:13px;padding:4px'>—</p>";
    document.getElementById("observe-list").innerHTML = observe || "<p style='color:#4b5563;font-size:13px;padding:4px'>—</p>";
    document.getElementById("etf-list").innerHTML     = etf     || "<p style='color:#4b5563;font-size:13px;padding:4px'>—</p>";

    const banner = document.getElementById("alert-banner");
    if (alerts.length) {
      banner.textContent = "🔔 " + alerts.join("　／　");
      banner.classList.add("show");
    } else {
      banner.classList.remove("show");
    }

  } catch(e) {
    document.getElementById("updated").textContent = "載入失敗：" + e.message;
  }
  btn.textContent = "↻ 更新";
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // 每5分鐘自動刷新
</script>
</body>
</html>
